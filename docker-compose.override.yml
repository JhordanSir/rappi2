# Desarrollo (se carga automáticamente con `docker compose up`).
# Monta el código fuente para recarga en caliente.
# Las BD NO publican puerto al host (por seguridad). Para inspeccionar datos en dev usa
# `docker compose exec postgres psql ...` / `docker compose exec mongodb mongosh ...`.
# Si necesitas un GUI local, añade tu propio override con `ports: ["127.0.0.1:5432:5432"]`.
services:
  api:
    # Igual que el comando base, pero además:
    #  - seed_if_empty: puebla datos demo en el primer arranque (idempotente; no
    #    pisa lo que crees al experimentar). Forzar recarga: docker compose exec api python -m scripts.seed_demo
    #  - uvicorn --reload: recarga en caliente al editar el código montado.
    command: sh -c "alembic upgrade head && python -m scripts.seed_admin && python -m scripts.seed_if_empty && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --reload"
    volumes:
      - ./backend:/app
