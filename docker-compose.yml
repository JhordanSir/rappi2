# Base (producción-segura). Para desarrollo se carga automáticamente
# docker-compose.override.yml (bind-mount de código + puertos de BD).
# Para producción:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rappi2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rappi2}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_USER:-admin}", "-p", "${MONGO_PASSWORD:-admin}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Keycloak: proveedor de identidad (OIDC). Importa el realm `rappi2` al arrancar.
  # En dev usa el modo `start-dev` (H2 en memoria). Consola: http://localhost:8080
  # (admin / ${KEYCLOAK_ADMIN_PASSWORD}). Para producción: backend Postgres + KC_HOSTNAME/TLS
  # (ver docker-compose.prod.yml).
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-rappi2.json:/opt/keycloak/data/import/realm-rappi2.json:ro
    ports:
      - "8080:8080"
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

  api:
    build: ./backend
    command: sh -c "alembic upgrade head && python -m scripts.seed_admin && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
    ports:
      - "8000:8000"
    environment:
      # Conexiones (se arman desde las partes del .env)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-rappi2}
      - MONGO_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@mongodb:27017/
      - MONGO_DB=${MONGO_DB:-rappi2_mongo}
      - REDIS_URL=redis://redis:6379/0
      # Autenticación (Keycloak OIDC). El backend valida los tokens contra el JWKS
      # de Keycloak; ya NO emite JWT propios. PUBLIC_URL = lo que ve el navegador (issuer),
      # INTERNAL_URL = cómo alcanza el backend a Keycloak dentro de la red Docker.
      - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      - KEYCLOAK_INTERNAL_URL=${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-rappi2}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-rappi2-frontend}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-rappi2-backend}
      - AUDIT_ENABLED=${AUDIT_ENABLED:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
      # URLs públicas (webhook de pago + back_urls de retorno)
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:5173}
      # Geocoding / ruteo
      - ORS_API_KEY=${ORS_API_KEY:-}
      - GEOCODING_ENABLED=${GEOCODING_ENABLED:-true}
      - RUTA_AUTOGENERAR=${RUTA_AUTOGENERAR:-true}
      - GPS_TRACKING_RETENCION_DIAS=${GPS_TRACKING_RETENCION_DIAS:-30}
      # MercadoPago (vacío = modo simulado)
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_PUBLIC_KEY=${MP_PUBLIC_KEY:-}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-}
      - MONEDA=${MONEDA:-PEN}
      # Validación de RUC (SUNAT). Sin SUNAT_API_URL solo se valida formato/dígito.
      - SUNAT_ENABLED=${SUNAT_ENABLED:-true}
      - SUNAT_API_URL=${SUNAT_API_URL:-}
      - SUNAT_API_TOKEN=${SUNAT_API_TOKEN:-}
      - SUNAT_TIMEOUT=${SUNAT_TIMEOUT:-6}
      - SUNAT_FALLO_ABIERTO=${SUNAT_FALLO_ABIERTO:-true}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-rappi2}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-rappi2-frontend}
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  mongodb_data:
